<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Caeden VR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
</head>
<!--Vr code below-->
<body>
<a-scene>
    <a-assets>
    <img id="floor" src="images/floor.jpg">
 <img id="banana" src="images/banana art butpurple.jpg">
<img id="seal" src="images/seal.png">
<img id="bananab"src="images/banana.png">

    </a-assets>
 <a-entity environment="preset: dream; dressingAmount: ;skycolor: #black"></a-entity>
<a-box id="floor" position="0 0 0" scale="10 0.1 9.5" src="#floor" height="0.1"></a-box>
<a-box id="box1" position="0 1.473 4.907" rotation="0 0 0" scale="10 3 0.2 " color="#F87EF6"></a-box>
<a-box id="box2" position="0 1.473 -4.907" rotation="0 0 0" scale="10 3 0.2 " color="#F87EF6"></a-box>
<a-box id="box3" position="5.049 1.454 -0.008" rotation="0 -90 0" scale="10 3  0.2 " color="#F87EF6"></a-box>
<a-box id="box4" position="-5.049 1.454 -0.008" rotation="0 -90 0" scale="10 3 0.2 " color="#F87EF6"></a-box>
<a-cylinder id="triangle_front" segments-radial="3" position="0 3.874 4.907" rotation="-90 0 0" scale="5.774 0.2 1.8" color="#F87EF6"></a-cylinder>
<a-cylinder id="triangle_back" segments-radial="3" position="0 3.874 -4.907" rotation="-90 0 0" scale="5.774 0.2 1.8" color="#F87EF6"></a-cylinder>
<a-box id="roof_right" position="2.580 4.328 0" rotation="28.433 90 0" scale="10.931 0.20 6.110" color="#E866E0"></a-box>
<a-box id="roof_left" position="-2.580 4.328 0" rotation="-28.433 90 0" scale="10.931 0.20 6.110" color="#E866E0"></a-box>
<a-plane id="art1" src="#banana" scale="2 2 0.05" rotation="0 0 0" position="-0.162 1.934 -4.792"></a-plane>
<a-plane id="art2" src="#bananab" scale="2 2 0.05" rotation="0 180 0" position="2.162 1.934 4.800"></a-plane>
<a-plane id="art2" src="#bananab" scale="2 2 0.05" rotation="0 180 0" position="0.162 1.934 4.800"></a-plane>
<a-plane id="art2" src="#bananab" scale="2 2 0.05" rotation="0 180 0" position="-1.662 1.934 4.800"></a-plane>
<a-box id="sealbox" src="#seal" scale="2 2 2" rotation="0 0 0" position="0 0.6 0"></a-box>
<a-box id="sealbox2" src="#seal" scale="99 99 199" rotation="0 0 0" position="-99 19 -2"></a-box>
<a-box id="sealbox2" src="#seal" scale="99 99 199" rotation="0 0 0" position="99 19 2"></a-box>
<a-box id="sealbox2" src="#seal" scale="99 99 199" rotation="0 0 0" position="0 99 0"></a-box>
<a-box id="sealbox2" src="#seal" scale="99 99 199" rotation="0 0 0" position="0 19 180"></a-box>
<a-box id="sealbox2" src="#seal" scale="99 99 199" rotation="0 0 0" position="0 19 -180"></a-box>

</a-scene>
</body>
</html>
